name: Update years of experience

on:
  schedule:
    - cron: '0 0 1 1 *'    # Runs at midnight on Jan 1st every year
  workflow_dispatch:         # Allows manual trigger from Actions tab anytime

jobs:
  update-years:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Required to push the commit back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Calculate years and update README + SVG
        run: |
          START_YEAR=2014
          CURRENT_YEAR=$(date +%Y)
          YEARS=$((CURRENT_YEAR - START_YEAR))
          echo "Calculated: $YEARS years (since $START_YEAR)"

          # Update year token in README.md (both the badge and the table row)
          sed -i "s/<!--START_YEARS-->[0-9]*<!--END_YEARS-->/${YEARS}/g" README.md

          # Update year pill text inside header.svg
          sed -i "s/[0-9]*+ YRS EXPERIENCE/${YEARS}+ YRS EXPERIENCE/g" header.svg

          echo "--- README diff ---"
          git diff README.md || true
          echo "--- SVG diff ---"
          git diff header.svg || true

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet README.md header.svg; then
            echo "No changes — year is already up to date."
          else
            git add README.md header.svg
            git commit -m "chore: auto-update years of experience to $(date +%Y)"
            git push
            echo "Files updated and pushed successfully."
          fi
